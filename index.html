<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>목장 관리</title>
<style>
:root{
  --green:#4a9e3f;--gl:#d4edda;--gd:#2d6a24;
  --red:#c0392b;--rl:#fde8e6;--rd:#8e1b13;
  --orange:#e67e22;--ol:#fef0e0;
  --blue:#2563a8;--bl:#dbeafe;
  --gray:#6b7280;--gray-l:#f3f4f6;--gray-b:#d1d5db;
  --bg:#f7f8fa;--card:#fff;--text:#1a1a2e;--t2:#555;--t3:#888;
  --r:12px;--rs:8px;--font:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--text);}
body{overflow-x:hidden;-webkit-overflow-scrolling:touch;}

#ls{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:14px;}
#ls h2{font-size:18px;font-weight:700;}
#ls p{font-size:13px;color:var(--t3);text-align:center;padding:0 30px;line-height:1.6;}
.sp{width:38px;height:38px;border:4px solid var(--gray-b);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#sb{position:fixed;top:0;left:0;right:0;height:3px;z-index:500;transition:background .3s;}

.ab{background:#fff;border-bottom:1px solid var(--gray-b);padding:0 12px;height:54px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.ab h1{font-size:16px;font-weight:700;}
.ab p{font-size:11px;color:var(--t3);}
.ab-mode{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;}
.ab-mode.online{background:#d4edda;color:#2d6a24;}
.ab-mode.offline{background:#f3f4f6;color:#555;}
.btn-add{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:8px 12px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);}

.fn{display:flex;gap:6px;padding:8px 12px;background:#fff;border-bottom:1px solid var(--gray-b);overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.fn::-webkit-scrollbar{display:none;}
.fb{flex-shrink:0;padding:7px 14px;font-size:13px;font-weight:600;border-radius:20px;border:1.5px solid var(--gray-b);background:#fff;color:var(--t2);cursor:pointer;white-space:nowrap;font-family:var(--font);}
.fb.active{color:#fff;}

.main{padding:12px;max-width:900px;margin:0 auto;}
.sg{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px;}
.sc{background:var(--card);border-radius:var(--rs);padding:10px 4px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.sn{font-size:20px;font-weight:700;}
.sl{font-size:10px;color:var(--t3);margin-top:2px;}

.stabs{display:flex;gap:4px;margin-bottom:10px;background:var(--gray-l);border-radius:20px;padding:3px;}
.stab{flex:1;text-align:center;padding:7px 2px;font-size:12px;font-weight:600;border-radius:17px;cursor:pointer;color:var(--t2);border:none;background:none;font-family:var(--font);}
.stab.active{background:#fff;color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.sec{display:none;}
.sec.active{display:block;}
.ab-banner{background:#fff3cd;border:1px solid #ffc107;border-radius:var(--rs);padding:10px 12px;margin-bottom:10px;font-size:13px;color:#856404;cursor:pointer;}

.hbar{font-size:11px;color:var(--t3);margin-bottom:8px;background:var(--gray-l);border-radius:6px;padding:5px 10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.legrow{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.leg{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--t2);}
.ldot{width:11px;height:11px;border-radius:3px;border:1px solid #ccc;}

/* ── 사육칸 스크롤 핵심 수정 ── */
.pen-scroll-wrap{
  width:100%;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  padding-bottom:8px;
}
.pen-scroll-wrap::-webkit-scrollbar{height:4px;}
.pen-scroll-wrap::-webkit-scrollbar-thumb{background:var(--gray-b);border-radius:2px;}

/* 복도식: 가로스크롤 안에 좌/우 두 줄 */
.corridor-layout{
  display:inline-flex;
  flex-direction:column;
  min-width:max-content;
}
.corridor-row{display:flex;gap:5px;}
.cmid{height:24px;display:flex;align-items:center;justify-content:center;background:var(--gray-l);border-radius:4px;margin:3px 0;font-size:11px;color:var(--t3);letter-spacing:2px;}
.slbl{font-size:11px;font-weight:600;color:var(--t3);padding:2px 8px;background:var(--gray-l);border-radius:4px;display:inline-block;margin-bottom:3px;}

/* 단일라인: 가로스크롤 한 줄 */
.single-row{
  display:inline-flex;
  flex-direction:row;
  gap:5px;
  min-width:max-content;
}

/* 칸 카드 — 고정 너비 */
.pc{
  background:var(--card);
  border:1.5px solid var(--gray-b);
  border-radius:var(--rs);
  padding:7px;
  min-height:80px;
  width:95px;
  flex-shrink:0;
  transition:border-color .15s,background .15s;
}
.pc.drag-over{border-color:var(--blue);background:var(--bl);}
.plbl{font-size:10px;font-weight:700;color:var(--t3);text-align:center;margin-bottom:5px;}
.ca{display:flex;flex-direction:column;gap:3px;min-height:28px;}

/* 소 칩 */
.cc{display:flex;align-items:center;gap:3px;border-radius:10px;padding:4px 6px;font-size:10px;cursor:pointer;user-select:none;border:1.5px solid transparent;flex-wrap:wrap;touch-action:none;}
.cc:active{filter:brightness(.85);}
.cc.dragging-chip{opacity:.3;}
.sf{background:var(--gl);color:var(--gd);border-color:var(--green);}
.sp2{background:var(--rl);color:var(--rd);border-color:var(--red);}
.so{background:#fff;color:#333;border-color:#aaa;}
.calf-chip{margin-left:8px;border-style:dashed;opacity:.85;}
.cid{font-weight:700;font-family:monospace;font-size:10px;}
.cage{font-size:9px;opacity:.75;}
.cdd{font-size:9px;font-weight:700;padding:1px 4px;border-radius:6px;white-space:nowrap;}
.du{background:var(--red);color:#fff;}
.ds{background:var(--orange);color:#fff;}
.do2{background:var(--green);color:#fff;}
.dv{background:var(--gray);color:#fff;}
.edot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.eon{background:var(--red);box-shadow:0 0 4px rgba(192,57,43,.8);}
.eoff{background:transparent;border:1px solid #ccc;}
.tdot{width:7px;height:7px;border-radius:50%;background:var(--blue);flex-shrink:0;}
.em{font-size:10px;color:var(--t3);text-align:center;padding:3px 0;}

#drag-ghost{position:fixed;pointer-events:none;z-index:9000;background:#1a1a2e;color:#fff;border-radius:10px;padding:5px 10px;font-size:12px;font-weight:700;opacity:.85;display:none;white-space:nowrap;}

/* 테이블 */
.ct{width:100%;border-collapse:collapse;font-size:12px;background:var(--card);border-radius:var(--r);overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07);}
.ct th{padding:9px 8px;text-align:left;font-weight:600;color:var(--t2);background:var(--gray-l);border-bottom:1px solid var(--gray-b);font-size:11px;}
.ct td{padding:9px 8px;border-bottom:1px solid #f0f0f0;color:var(--text);vertical-align:middle;}
.ct tr:active td{background:var(--gray-l);}
.badge{display:inline-block;padding:2px 7px;border-radius:8px;font-size:11px;font-weight:600;}
.bf{background:var(--gl);color:var(--gd);}
.bp{background:var(--rl);color:var(--rd);}
.bo{background:#f3f4f6;color:#555;border:1px solid #ccc;}
.be{background:var(--rl);color:var(--rd);font-size:10px;}
.bt{background:var(--bl);color:var(--blue);font-size:10px;}

.ll{background:var(--card);border-radius:var(--r);box-shadow:0 1px 4px rgba(0,0,0,.07);}
.li{padding:10px 14px;border-bottom:1px solid #f0f0f0;font-size:12px;display:flex;gap:8px;}
.lt{color:var(--t3);font-size:11px;min-width:85px;white-space:nowrap;}
.le{padding:24px;text-align:center;color:var(--t3);font-size:13px;}

/* 전체현황 */
.og{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.oc{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:0 1px 6px rgba(0,0,0,.08);}
.on{font-size:15px;font-weight:700;margin-bottom:10px;}
.or{display:flex;justify-content:space-between;font-size:13px;padding:3px 0;color:var(--t2);}
.ov2{font-weight:700;color:var(--text);}
.ow{color:var(--red)!important;}
.goto-btn{margin-top:10px;width:100%;padding:8px;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--font);}

/* 모달 */
.bd{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:flex-end;justify-content:center;}
.bd.ct2{align-items:center;}
.bd.hid{display:none;}
.md{background:var(--card);border-radius:20px 20px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.bd.ct2 .md{border-radius:20px;margin:12px;max-height:90vh;}
.mh2{width:36px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 0;}
.mhd{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;border-bottom:1px solid var(--gray-b);position:sticky;top:0;background:#fff;z-index:5;}
.mtt{font-size:16px;font-weight:700;}
.mc{background:var(--gray-l);border:none;border-radius:50%;width:30px;height:30px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--t2);}
.mb{padding:12px 16px 8px;}
.ms2{background:var(--gray-l);margin:12px -16px 10px;padding:6px 16px;font-size:11px;font-weight:700;color:var(--t3);letter-spacing:1px;}
.fi{margin-bottom:12px;}
.fi label{display:block;font-size:12px;font-weight:600;color:var(--t2);margin-bottom:5px;}
.fi input,.fi select{width:100%;padding:10px 12px;border:1.5px solid var(--gray-b);border-radius:var(--rs);font-size:14px;background:#fff;color:var(--text);font-family:var(--font);outline:none;}
.fi input:focus,.fi select:focus{border-color:var(--blue);}
.f2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.dprev{margin-top:6px;padding:10px;border-radius:var(--rs);font-size:14px;font-weight:700;text-align:center;}
.dpg{background:var(--gl);color:var(--gd);}
.dps{background:var(--ol);color:var(--orange);}
.dpu{background:var(--rl);color:var(--red);}
.dpv{background:var(--gray-l);color:var(--gray);}
.cr{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;margin-bottom:6px;}
.crr{background:var(--rl);}
.crb{background:var(--bl);}
.cr input[type=checkbox]{width:18px;height:18px;cursor:pointer;accent-color:var(--blue);}
.cr label{font-size:14px;font-weight:700;cursor:pointer;}
.hist-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.hi{background:var(--gray-l);border-radius:6px;padding:8px 10px;}
.hl2{font-size:10px;font-weight:700;color:var(--t3);margin-bottom:4px;}
.hi input{width:100%;border:1px solid #ddd;border-radius:5px;padding:5px 7px;font-size:12px;font-family:var(--font);background:#fff;color:var(--text);}
.cb{background:#f0f4ff;border:1px dashed var(--blue);border-radius:8px;padding:10px 12px;margin-top:8px;}
.cb h4{font-size:12px;font-weight:700;color:var(--blue);margin-bottom:8px;}
.ci{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid #dde4f8;font-size:13px;}
.ci:last-child{border:none;}
.lb{padding:8px 10px;border-radius:6px;font-size:11px;margin-top:6px;line-height:1.7;}
.lbr{background:var(--rl);color:var(--rd);}
.lbb{background:var(--bl);color:var(--blue);}
.ma{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--gray-b);background:#fff;position:sticky;bottom:0;}
.ma button{flex:1;padding:13px;border-radius:var(--rs);font-size:14px;font-weight:700;border:none;cursor:pointer;font-family:var(--font);}
.bsv{background:var(--blue);color:#fff;}
.bdl{background:var(--rl);color:var(--red);flex:.6;}
.bcl{background:var(--gray-l);color:var(--t2);flex:.6;}
.ac{border-radius:8px;padding:12px;margin-bottom:8px;}
.acr{background:var(--rl);border-left:4px solid var(--red);}
.aco{background:var(--ol);border-left:4px solid var(--orange);}

#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:#1a1a2e;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;font-weight:600;opacity:0;transition:all .25s;z-index:9999;white-space:nowrap;pointer-events:none;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:480px){
  .sg{grid-template-columns:repeat(3,1fr);}
  .hist-grid{grid-template-columns:1fr;}
  .og{grid-template-columns:1fr 1fr;}
  .f2{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="ls" style="display:none"><div class="sp"></div><h2>🐄 목장 관리</h2><p id="lm">연결 중...</p></div>
<div id="sb"></div>
<div id="drag-ghost"></div>

<div class="ab">
  <div><h1>🐄 목장 관리</h1><p id="today-lbl"></p></div>
  <div style="display:flex;align-items:center;gap:8px;">
    <span class="ab-mode offline" id="mode-badge">로컬</span>
    <button class="btn-add" onclick="showAdd()">+ 등록</button>
  </div>
</div>
<div class="fn" id="fn"></div>
<div class="main" id="main"></div>

<!-- 수정 모달 -->
<div class="bd hid" id="eb" onclick="bgCE(event)">
  <div class="md">
    <div class="mh2"></div>
    <div class="mhd"><span class="mtt" id="etitle">개체 정보</span><button class="mc" onclick="closeEdit()">✕</button></div>
    <div class="mb" id="ebody"></div>
    <div class="ma" id="eact"></div>
  </div>
</div>
<!-- 등록 모달 -->
<div class="bd hid ct2" id="ab2" onclick="bgCA(event)">
  <div class="md">
    <div class="mh2"></div>
    <div class="mhd"><span class="mtt">새 개체 등록</span><button class="mc" onclick="closeAdd()">✕</button></div>
    <div class="mb">
      <div class="f2">
        <div class="fi"><label>개체관리번호 *</label><input id="a-id" placeholder="예) KPN001"></div>
        <div class="fi"><label>출생일 *</label><input id="a-dob" type="date"></div>
      </div>
      <div class="f2">
        <div class="fi"><label>성별</label>
          <select id="a-sex"><option value="암">암</option><option value="수">수</option><option value="프리마틴">프리마틴</option></select>
        </div>
        <div class="fi"><label>정액번호</label><input id="a-semen" placeholder="정액번호"></div>
      </div>
      <div class="f2">
        <div class="fi"><label>목장</label><select id="a-farm" onchange="onAFC()"></select></div>
        <div class="fi"><label>사육칸</label><select id="a-pen"></select></div>
      </div>
      <div class="fi"><label>상태</label>
        <select id="a-status" onchange="document.getElementById('a-bd').style.display=this.value==='pregnant'?'block':'none'">
          <option value="fattening">비육</option><option value="pregnant">임신</option><option value="open">공태</option>
        </select>
      </div>
      <div id="a-bd" style="display:none" class="fi"><label>출산예정일</label><input id="a-bdate" type="date"></div>
      <div class="fi"><label>비고</label><input id="a-note" placeholder="메모"></div>
    </div>
    <div class="ma"><button class="bcl" onclick="closeAdd()">취소</button><button class="bsv" onclick="doAdd()">등록</button></div>
  </div>
</div>
<div id="toast"></div>

<script>
(function(){
'use strict';

var FARMS=[
  {id:'farm0',name:'전체 현황',color:'#444441'},
  {id:'farm1',name:'달콤농장',color:'#D85A30',layout:'corridor',left:7,right:7},
  {id:'farm2',name:'한아름농장1',color:'#0F6E56',layout:'corridor',left:9,right:10},
  {id:'farm3',name:'한아름농장2',color:'#185FA5',layout:'corridor',left:12,right:12},
  {id:'farm4',name:'한아름농장3',color:'#7F77DD',layout:'single',count:5},
];

function today2(){return new Date().toISOString().slice(0,10);}
function calcAge(dob){if(!dob)return 0;var now=new Date(),b=new Date(dob);return Math.max(0,Math.round((now-b)/(1000*60*60*24*30.44)));}
function cd(d){if(!d)return null;var due=new Date(d),now=new Date();now.setHours(0,0,0,0);return Math.round((due-now)/86400000);}
function dl(d){return d===null?'':(d<0?'D+'+Math.abs(d):d===0?'D-Day':'D-'+d);}
function dt(d){return d===null?'':(d<0?'dv':d<=7?'du':d<=30?'ds':'do2');}
function dp(d){return d===null?'dpg':(d<0?'dpv':d<=7?'dpu':d<=30?'dps':'dpg');}
function fd(d){return d?d.replace(/-/g,'.'):'-';}
function sl(s){return s==='fattening'?'비육':s==='pregnant'?'임신':'공태';}
function sb2(s){return s==='fattening'?'bf':s==='pregnant'?'bp':'bo';}
function ns(){return new Date().toLocaleString('ko-KR',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'});}
function sexBadge(sex){
  if(sex==='암') return '<span style="background:#fce7f3;color:#9d174d;font-size:10px;padding:1px 5px;border-radius:4px;font-weight:600;">암</span>';
  if(sex==='수') return '<span style="background:#dbeafe;color:#1e40af;font-size:10px;padding:1px 5px;border-radius:4px;font-weight:600;">수</span>';
  return '<span style="background:#f3f4f6;color:#555;font-size:10px;padding:1px 5px;border-radius:4px;font-weight:600;">프리</span>';
}

function mkPens(fid,f){
  var p=[];
  if(f.layout==='corridor'){
    for(var i=1;i<=f.left;i++) p.push({id:fid+'-L'+i,name:'좌'+i+'칸',side:'left'});
    for(var i=1;i<=f.right;i++) p.push({id:fid+'-R'+i,name:'우'+i+'칸',side:'right'});
  }else{
    for(var i=1;i<=f.count;i++) p.push({id:fid+'-'+i,name:i+'칸',side:'single'});
  }
  return p;
}

function newCow(id,dob,sex,semen,penId,farmId,status,birthdate,note){
  return {id:id,dob:dob||'',sex:sex||'암',semen:semen||'',penId:penId,status:status||'fattening',birthdate:birthdate||'',delivered:false,estrus:false,estrusLog:[],treated:false,inseminationLog:[],pregnancyLog:[],moveLogs:[],vaccination:{fmd:'',lumpy:'',brucella:'',brucellaResult:''},note:note||'',parentId:null,_farm:farmId};
}

var state={};
['farm1','farm2','farm3','farm4'].forEach(function(fid){
  var f=FARMS.find(function(x){return x.id===fid;});
  state[fid]={pens:mkPens(fid,f),cows:[],logs:[]};
});

var activeFarm='farm0',editId=null,editFarm=null;
var saveTimer=null,isOnline=false,db=null;
var drag={active:false,cowId:null,farmId:null,startX:0,startY:0,moved:false,timer:null};

// ── localStorage ──
function compat(c,fid){
  if(!c.sex) c.sex=c.gender||'암';
  if(!c.dob) c.dob='';
  if(!c.inseminationLog) c.inseminationLog=[];
  if(!c.pregnancyLog) c.pregnancyLog=[];
  if(!c.moveLogs) c.moveLogs=[];
  if(!c.vaccination) c.vaccination={fmd:'',lumpy:'',brucella:'',brucellaResult:''};
  c._farm=fid; return c;
}
function lsSave(){
  try{
    var d={};
    ['farm1','farm2','farm3','farm4'].forEach(function(fid){d[fid]={cows:state[fid].cows,logs:state[fid].logs};});
    localStorage.setItem('ranch_v3',JSON.stringify(d));
  }catch(e){}
}
function lsLoad(){
  try{
    var raw=localStorage.getItem('ranch_v3');
    if(!raw)return;
    var d=JSON.parse(raw);
    ['farm1','farm2','farm3','farm4'].forEach(function(fid){

}
function fsSave(fid){

    db.collection('farms').doc(fid).set(clean).then(function(){setSyncUI('saved');}).catch(function(){setSyncUI('error');});
  }catch(e){setSyncUI('error');}
}

function pC(pen,cows,fid){
  var penCows=cows.filter(function(c){return c.penId===pen.id;});
  var ordered=[];
  penCows.filter(function(c){return !c.parentId;}).forEach(function(m){
    ordered.push(m);
    penCows.filter(function(c){return c.parentId===m.id;}).forEach(function(cf){ordered.push(cf);});
  });
  penCows.filter(function(c){return c.parentId&&!penCows.find(function(m){return m.id===c.parentId;});}).forEach(function(c){ordered.push(c);});
  var ch=ordered.length?ordered.map(function(c){return cowC(c,fid);}).join(''):'<div class="em">·</div>';
  return '<div class="pc" data-pen="'+pen.id+'" data-farm="'+fid+'"><div class="plbl">'+pen.name+'</div><div class="ca">'+ch+'</div></div>';
}

function cowC(c,fid){
  var d=cd(c.birthdate);
  var dd=(c.status==='pregnant'&&c.birthdate&&!c.delivered)?'<span class="cdd '+dt(d)+'">'+dl(d)+'</span>':(c.status==='pregnant'&&c.delivered?'<span class="cdd do2">출산</span>':'');
  var est=c.status==='open'?'<span class="edot '+(c.estrus?'eon':'eoff')+'"></span>':'';
  var trt=c.treated?'<span class="tdot"></span>':'';
  var f=fid||c._farm||'';
  var age=c.dob?calcAge(c.dob):(c.age||0);
  return '<div class="cc '+(c.status==='fattening'?'sf':c.status==='pregnant'?'sp2':'so')+(c.parentId?' calf-chip':'')+'" data-cow="'+c.id+'" data-farm="'+f+'" onclick="openEdit(\''+c.id+'\',\''+f+'\')">'+
    '<span class="cid">'+(c.parentId?'↳':'')+c.id+'</span>'+
    '<span class="cage">'+age+'개월</span>'+
    dd+est+trt+'</div>';
}

// ── 드래그 (PC + 터치 통합) ──
function attachEv(fid){
  var wrap=document.getElementById('sp-'+fid);if(!wrap)return;
  var ghost=document.getElementById('drag-ghost');

  wrap.querySelectorAll('.cc').forEach(function(chip){
    chip.setAttribute('draggable','true');

    // PC 드래그
    chip.addEventListener('dragstart',function(e){
      drag.active=true;drag.cowId=chip.dataset.cow;drag.farmId=fid;
      chip.classList.add('dragging-chip');e.dataTransfer.effectAllowed='move';
    });
    chip.addEventListener('dragend',function(){
      chip.classList.remove('dragging-chip');drag.active=false;drag.cowId=null;
      wrap.querySelectorAll('.pc').forEach(function(c){c.classList.remove('drag-over');});
    });

    // 터치 드래그
    chip.addEventListener('touchstart',function(e){
      var t=e.touches[0];
      drag.startX=t.clientX;drag.startY=t.clientY;
      drag.cowId=chip.dataset.cow;drag.farmId=fid;drag.moved=false;drag.active=false;
      drag.timer=setTimeout(function(){
        drag.active=true;
        chip.classList.add('dragging-chip');
        ghost.textContent=chip.dataset.cow;
        ghost.style.display='block';
        ghost.style.left=(t.clientX-40)+'px';
        ghost.style.top=(t.clientY-25)+'px';
      },250);
    },{passive:true});

    chip.addEventListener('touchmove',function(e){
      var t=e.touches[0];
      var dx=t.clientX-drag.startX,dy=t.clientY-drag.startY;
      if(Math.abs(dx)>6||Math.abs(dy)>6) drag.moved=true;
      if(!drag.active){
        if(drag.moved){clearTimeout(drag.timer);drag.timer=null;}
        return;
      }
      e.preventDefault();
      ghost.style.left=(t.clientX-40)+'px';
      ghost.style.top=(t.clientY-25)+'px';
      // 하이라이트
      wrap.querySelectorAll('.pc').forEach(function(c){c.classList.remove('drag-over');});
      ghost.style.display='none';
      var under=document.elementFromPoint(t.clientX,t.clientY);
      ghost.style.display='block';
      if(under){var card=under.closest('.pc');if(card)card.classList.add('drag-over');}
    },{passive:false});

    chip.addEventListener('touchend',function(e){
      clearTimeout(drag.timer);
      ghost.style.display='none';
      wrap.querySelectorAll('.pc').forEach(function(c){c.classList.remove('drag-over');});
      if(drag.active){
        var t=e.changedTouches[0];
        ghost.style.display='none';
        var under=document.elementFromPoint(t.clientX,t.clientY);
        if(under){var card=under.closest('.pc');if(card&&card.dataset.pen)doDrop(card.dataset.pen,fid,drag.cowId);}
        drag.active=false;chip.classList.remove('dragging-chip');
      } else if(!drag.moved){
        // 짧은 탭 = 정보 수정
        openEdit(chip.dataset.cow,chip.dataset.farm||fid);
      }
      drag.cowId=null;
    });
  });

  // PC 드롭존
  wrap.querySelectorAll('.pc').forEach(function(card){
    card.addEventListener('dragover',function(e){e.preventDefault();wrap.querySelectorAll('.pc').forEach(function(c){c.classList.remove('drag-over');});card.classList.add('drag-over');});
    card.addEventListener('dragleave',function(e){if(!card.contains(e.relatedTarget))card.classList.remove('drag-over');});
    card.addEventListener('drop',function(e){e.preventDefault();card.classList.remove('drag-over');if(drag.cowId)doDrop(card.dataset.pen,fid,drag.cowId);});
  });
}

window.doDrop=function(toPen,fid,cowId){
  var cid=cowId||drag.cowId;if(!cid)return;
  var d=state[fid],cow=d.cows.find(function(c){return c.id===cid;});
  if(!cow||cow.penId===toPen){drag.cowId=null;return;}
  var from=d.pens.find(function(p){return p.id===cow.penId;}),to=d.pens.find(function(p){return p.id===toPen;});
  var calves=d.cows.filter(function(c){return c.parentId===cow.id;});
  var le={time:ns(),type:'move',cowId:cow.id,from:from?from.name:'-',to:to?to.name:'-',note:calves.length?'새끼 '+calves.length+'마리 함께':''};
  d.logs.push(le);cow.moveLogs=cow.moveLogs||[];cow.moveLogs.push(le);
  cow.penId=toPen;calves.forEach(function(cf){cf.penId=toPen;});
  drag.cowId=null;scheduleSave(fid);rPens(fid);rList(fid);
  showToast((to?to.name:toPen)+'으로 이동');
};

window.onTrtChange=function(){
  var checked=document.getElementById('e-trt').checked;
  document.getElementById('e-semen-row').style.display=checked?'block':'none';
  // 수정 처리하면 발정 자동 해제
  if(checked){
    var estChk=document.getElementById('e-est');
    var estDot=document.getElementById('e-ed');
    if(estChk) estChk.checked=false;
    if(estDot) estDot.className='edot eoff';
  }
};

window.onES=function(){
  var s=document.getElementById('e-status').value;
  document.getElementById('e-preg').style.display=s==='pregnant'?'block':'none';
  document.getElementById('e-open').style.display=s==='open'?'block':'none';
};
window.uDD=function(){
  var v=document.getElementById('e-bd').value,el=document.getElementById('e-ddp');
  if(!v){el.style.display='none';return;}
  var d=cd(v);el.className='dprev '+dp(d);el.style.display='block';el.textContent=dl(d)+' — '+fd(v);
};

window.doSave=function(){
  var d=state[editFarm],cow=d.cows.find(function(c){return c.id===editId;});if(!cow)return;
  var np=document.getElementById('e-pen').value,ns2=document.getElementById('e-status').value;
  if(cow.penId!==np){
    var from=d.pens.find(function(p){return p.id===cow.penId;}),to=d.pens.find(function(p){return p.id===np;});
    var le={time:ns(),type:'move',cowId:cow.id,from:from?from.name:'-',to:to?to.name:'-',note:''};
    d.logs.push(le);cow.moveLogs=cow.moveLogs||[];cow.moveLogs.push(le);
    d.cows.filter(function(c){return c.parentId===cow.id;}).forEach(function(cf){cf.penId=np;});
    cow.penId=np;
  }
  cow.id=document.getElementById('e-id').value.trim()||cow.id;
  cow.dob=document.getElementById('e-dob').value;
  cow.sex=document.getElementById('e-sex').value;
  cow.semen=document.getElementById('e-semen').value.trim();
  cow.status=ns2;
  cow.note=document.getElementById('e-note').value.trim();

  if(ns2==='pregnant'){
    var nd=document.getElementById('e-del').checked;
    if(!cow.delivered&&nd){
      cow.pregnancyLog=cow.pregnancyLog||[];
      cow.pregnancyLog.push({time:ns(),note:'출산 완료'});
      d.logs.push({time:ns(),type:'birth',cowId:cow.id,note:'출산 완료'});
    }
    cow.birthdate=document.getElementById('e-bd').value;
    cow.delivered=nd;
  }else{cow.birthdate='';cow.delivered=false;}

  if(ns2==='open'&&cow.sex==='암'){
    var ne=document.getElementById('e-est').checked;
    var nt=document.getElementById('e-trt').checked;
    var su=(document.getElementById('e-semen-used')||{}).value||'';
    // 발정 변경 기록
    if(cow.estrus!==ne){
      cow.estrusLog=cow.estrusLog||[];
      cow.estrusLog.push({time:ns(),on:ne});
      d.logs.push({time:ns(),type:'estrus',cowId:cow.id,on:ne});
    }
    // 수정 처리 (체크 시 기록 추가 + 발정 자동 해제)
    if(nt){
      cow.inseminationLog=cow.inseminationLog||[];
      cow.inseminationLog.push({time:ns(),semen:su});
      d.logs.push({time:ns(),type:'treat',cowId:cow.id,semen:su,note:su?'정액: '+su:''});
      cow.estrus=false; // 발정 자동 해제
    }else{
      cow.estrus=ne;
    }
    cow.treated=false; // 항상 리셋 (다음 수정에 다시 체크)
  }else{cow.estrus=false;cow.treated=false;}

  cow.vaccination={
    fmd:document.getElementById('e-fmd').value,
    lumpy:document.getElementById('e-lumpy').value,
    brucella:document.getElementById('e-brucella').value,
    brucellaResult:document.getElementById('e-brucella-result').value
  };
  var fid=editFarm;closeEdit();scheduleSave(fid);renderMain();showToast('저장됨');
};

window.doDel=function(){
  if(!confirm(editId+' 삭제하시겠습니까?'))return;
  var d=state[editFarm];
  d.cows=d.cows.filter(function(c){return c.id!==editId&&c.parentId!==editId;});
  var fid=editFarm;closeEdit();scheduleSave(fid);renderMain();showToast('삭제됨');
};
window.addCalf=function(parentId,fid){
  var d=state[fid],id=document.getElementById('cf-id').value.trim();
  var sex=document.getElementById('cf-sex').value;
  var dob=document.getElementById('cf-dob').value;
  if(!id){showToast('새끼 번호 입력 필요');return;}
  var all=Object.values(state).reduce(function(acc,s){return acc.concat(s.cows);},[]);
  if(all.find(function(c){return c.id===id;})){showToast('이미 존재하는 번호');return;}
  var parent=d.cows.find(function(c){return c.id===parentId;});
  var c=newCow(id,dob,sex,'',parent.penId,fid,'open','','');
  c.parentId=parentId;c.note=sex+'송아지';
  d.cows.push(c);
  d.logs.push({time:ns(),type:'birth',cowId:parentId,note:'새끼: '+id+'('+sex+')'});
  parent.pregnancyLog=parent.pregnancyLog||[];
  parent.pregnancyLog.push({time:ns(),note:'새끼 출산: '+id+' ('+sex+')'});
  scheduleSave(fid);closeEdit();openEdit(parentId,fid);showToast('새끼 '+id+' 등록');
};
window.sepCalf=function(calfId,fid){
  var d=state[fid],calf=d.cows.find(function(c){return c.id===calfId;});if(!calf)return;
  calf.parentId=null;
  d.logs.push({time:ns(),type:'separate',cowId:calfId,note:'모체 분리'});
  scheduleSave(fid);closeEdit();openEdit(calfId,fid);showToast(calfId+' 분리됨');
};

window.deleteLog=function(fid,idx){
  if(!confirm('이 기록을 삭제할까요?'))return;
  state[fid].logs.splice(idx,1);
  scheduleSave(fid);rLog(fid);showToast('삭제됨');
};
window.clearAllLogs=function(fid){
  if(!confirm('전체 기록을 삭제할까요?'))return;
  state[fid].logs=[];scheduleSave(fid);rLog(fid);showToast('전체 삭제됨');
};
window.deleteCowLog=function(fid,cowId,type,idx){
  if(!confirm('이 기록을 삭제할까요?'))return;
  var cow=state[fid]&&state[fid].cows.find(function(c){return c.id===cowId;});
  if(!cow)return;
  if(type==='estrus'&&cow.estrusLog)cow.estrusLog.splice(idx,1);
  if(type==='insemination'&&cow.inseminationLog)cow.inseminationLog.splice(idx,1);
  if(type==='pregnancy'&&cow.pregnancyLog)cow.pregnancyLog.splice(idx,1);
  if(type==='move'&&cow.moveLogs)cow.moveLogs.splice(idx,1);
  scheduleSave(fid);
  var cid=editId,cf=editFarm;
  closeEdit();openEdit(cid,cf);showToast('삭제됨');
};


window.fetchAgrix=function(cowId){
  var st=document.getElementById('agrix-status');
  if(!cowId||cowId.length<8){if(st)st.textContent='💡 접종·검사 정보를 입력하세요';return;}
  if(st){st.textContent='🔄 Agrix 조회 중...';st.style.color='var(--orange)';}
  var key='38a282d5f67b6e69fd25507292467523e62100471da68bbc48731f792445e5c7';
  Promise.all([1,4,6].map(function(opt){
    return fetch('http://data.ekape.or.kr/openapi-data/service/user/animalTrace/traceNoSearch?ServiceKey='+encodeURIComponent(key)+'&traceNo='+encodeURIComponent(cowId)+'&optionNo='+opt)
      .then(function(r){return r.text();}).catch(function(){return '';});
  })).then(function(res){
    var xml1=res[0],xml4=res[1],xml6=res[2];
    var updated=[];
    function gv(xml,tag){var m=xml.match(new RegExp('<'+tag+'>([^<]*)</'+tag+'>'));return m?m[1].trim():'';}
    // 출생일
    var birth=gv(xml1,'birthYmd');
    if(birth){var bd=birth.replace(/^(\d{4})(\d{2})(\d{2})$/,'$1-$2-$3');var el=document.getElementById('e-dob');if(el&&!el.value){el.value=bd;updated.push('출생일');}}
    // 성별
    var sex=gv(xml1,'sexNm');
    if(sex){var s=sex.indexOf('암')>=0?'암':sex.indexOf('수')>=0?'수':'';var el=document.getElementById('e-sex');if(el&&s){el.value=s;updated.push('성별');}}
    // 구제역
    var fmdDates=[];var re4=/<item>([\s\S]*?)<\/item>/g;var m;
    while((m=re4.exec(xml4))!==null){var nm=gv(m[1],'injcSeNm');var dt=gv(m[1],'injcDt');if(nm.indexOf('구제역')>=0&&dt)fmdDates.push(dt);}
    if(fmdDates.length){var d=fmdDates.sort().pop().replace(/^(\d{4})(\d{2})(\d{2})$/,'$1-$2-$3');var el=document.getElementById('e-fmd');if(el){el.value=d;updated.push('구제역');}}
    // 럼피스킨
    var lumpyDates=[];re4.lastIndex=0;
    while((m=re4.exec(xml4))!==null){var nm=gv(m[1],'injcSeNm');var dt=gv(m[1],'injcDt');if((nm.indexOf('럼피')>=0||nm.indexOf('LSD')>=0)&&dt)lumpyDates.push(dt);}
    if(lumpyDates.length){var d=lumpyDates.sort().pop().replace(/^(\d{4})(\d{2})(\d{2})$/,'$1-$2-$3');var el=document.getElementById('e-lumpy');if(el){el.value=d;updated.push('럼피스킨');}}
    // 브루셀라
    var re6=/<item>([\s\S]*?)<\/item>/g;var lastBrc=null;
    while((m=re6.exec(xml6))!==null)lastBrc=m[1];
    if(lastBrc){
      var exm=gv(lastBrc,'exmYmd');var rslt=gv(lastBrc,'rsltNm');
      if(exm){var d=exm.replace(/^(\d{4})(\d{2})(\d{2})$/,'$1-$2-$3');var el=document.getElementById('e-brucella');if(el){el.value=d;updated.push('브루셀라');}}
      if(rslt){var el=document.getElementById('e-brucella-result');if(el){el.value=rslt;updated.push('브루셀라결과');}}
    }
    if(st){
      if(updated.length){st.textContent='✅ '+updated.join(', ')+' 자동입력';st.style.color='var(--green)';}
      else{st.textContent='⚠ Agrix 데이터 없음 — 직접 입력하세요';st.style.color='var(--orange)';}
    }
  }).catch(function(){
    if(st){st.textContent='⚠ Agrix 연결 실패 (CORS) — 직접 입력하세요';st.style.color='var(--red)';}
  });
};

window.showAdd=function(){

    return '<option value="'+fid+'"'+(fid===activeFarm&&activeFarm!=='farm0'?' selected':'')+'>'+FARMS.find(function(f){return f.id===fid;}).name+'</option>';
  }).join('');
  onAFC();

};

  var fid=document.getElementById('a-farm').value;

window.doAdd=function(){
  var fid=document.getElementById('a-farm').value;
  var id=document.getElementById('a-id').value.trim();
  var dob=document.getElementById('a-dob').value;
  var sex=document.getElementById('a-sex').value;
  var semen=document.getElementById('a-semen').value.trim();
  var penId=document.getElementById('a-pen').value;
  var st=document.getElementById('a-status').value;
  var bd=st==='pregnant'?document.getElementById('a-bdate').value:'';
  var note=document.getElementById('a-note').value.trim();
  if(!id){showToast('개체번호 입력 필요');return;}
  if(!dob){showToast('출생일 입력 필요');return;}
  var all=Object.values(state).reduce(function(acc,d){return acc.concat(d.cows);},[]);
  if(all.find(function(c){return c.id===id;})){showToast('이미 존재하는 번호');return;}
  var c=newCow(id,dob,sex,semen,penId,fid,st,bd,note);
  state[fid].cows.push(c);
  state[fid].logs.push({time:ns(),type:'add',cowId:id});
  closeAdd();scheduleSave(fid);activeFarm=fid;buildNav();renderMain();showToast(id+' 등록 완료');
};
window.closeAdd=function(){document.getElementById('ab2').classList.add('hid');};
window.bgCA=function(e){if(e.target===document.getElementById('ab2'))closeAdd();};

  toastT=setTimeout(function(){el.classList.remove('show');},2200);
};
